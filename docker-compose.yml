services:
  db:
    image: postgres:16
    container_name: grants_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grants_db
    ports:
      - "5432:5432"

  api:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "sleep 10 &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"